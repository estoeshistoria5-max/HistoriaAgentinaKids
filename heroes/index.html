<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Héroes y Heroínas | Historia Argentina Kids</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f8ff; }
        h1, h2, h3 { font-family: 'Fredoka One', cursive; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between text-slate-800">

    <div id="menu-principal"></div>

    <!-- Migas de pan -->
    <div class="max-w-6xl w-full mx-auto px-4 pt-4">
        <p class="text-xs text-slate-500">
            <a href="../index.html" class="hover:underline text-sky-600">Inicio</a> ▶ Héroes y Heroínas
        </p>
    </div>

    <!-- Main Content -->
    <main class="max-w-6xl w-full mx-auto p-4 flex-grow flex flex-col gap-8">

        <section class="bg-sky-100 rounded-3xl p-6 sm:p-8 shadow-inner border-4 border-dashed border-sky-300 text-center">
            <h2 class="text-xl sm:text-2xl text-blue-900 mb-3">⭐ Grandes Argentinos y Argentinas</h2>
            <p class="text-sm text-slate-700 max-w-2xl mx-auto leading-relaxed">
                Lorem ipsum dolor sit amet, consectetur adipiscing elit. Elegí una tarjeta para conocer
                la vida, las batallas y las aventuras de cada héroe y heroína de nuestra historia.
            </p>
        </section>

        <!-- Grilla de Héroes (se llena dinámicamente con JS) -->
        <section id="heroes-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
            <!-- Las tarjetas se generan acá a partir de heroes-datos.js -->
        </section>

    </main>

    <div id="footer-principal"></div>

    <script src="heroes-datos.js"></script>
    <script>
        function renderizarHeroes() {
            const grid = document.getElementById("heroes-grid");
            grid.innerHTML = "";

            heroesData.forEach(heroe => {
                if (heroe.activo) {
                    // Tarjeta activa: es un link real a la página del héroe
                    const card = document.createElement("a");
                    card.href = heroe.url;
                    card.className = "bg-white rounded-2xl p-4 shadow-lg border-4 border-sky-400 transition transform hover:-translate-y-1 flex flex-col items-center text-center gap-2";
                    card.innerHTML = `
                        <span class="text-4xl">${heroe.emoji}</span>
                        <h3 class="text-sm font-bold text-blue-900 leading-tight">${heroe.nombre}</h3>
                        <p class="text-[10px] text-slate-600 leading-snug">${heroe.descripcion}</p>
                        <span class="mt-1 bg-sky-500 text-white text-[10px] font-bold py-1.5 px-3 rounded-full">Conocer ▶</span>
                    `;
                    grid.appendChild(card);
                } else {
                    // Tarjeta inactiva: todavía no tiene página, se muestra como "Próximamente"
                    const card = document.createElement("div");
                    card.className = "bg-white/60 rounded-2xl p-4 shadow border-4 border-slate-200 flex flex-col items-center text-center gap-2 opacity-60 cursor-not-allowed";
                    card.innerHTML = `
                        <span class="text-4xl">${heroe.emoji}</span>
                        <h3 class="text-sm font-bold text-slate-500 leading-tight">${heroe.nombre}</h3>
                        <p class="text-[10px] text-slate-500 leading-snug">${heroe.descripcion}</p>
                        <span class="mt-1 bg-slate-300 text-white text-[10px] font-bold py-1.5 px-3 rounded-full">Próximamente</span>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        renderizarHeroes();
    </script>

    <script>
      const RUTA_BASE = "../";
      const PAGINA_ACTUAL = "";
    </script>
    <script src="../js/componentes.js"></script>
    <script>cargarMenu(RUTA_BASE, PAGINA_ACTUAL);</script>

</body>
</html>
