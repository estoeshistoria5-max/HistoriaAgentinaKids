<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Línea de Tiempo | Historia Argentina Kids</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f8ff; }
        h1, h2, h3 { font-family: 'Fredoka One', cursive; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between text-slate-800">

    <div id="menu-principal"></div>

    <main class="max-w-4xl w-full mx-auto p-4 flex-grow flex flex-col gap-6 mt-6">

        <section class="bg-sky-100 rounded-3xl p-6 sm:p-8 shadow-inner border-4 border-dashed border-sky-300 text-center">
            <span class="text-5xl">🗺️</span>
            <h1 class="text-2xl sm:text-3xl text-blue-900 mt-2 mb-2">Línea de Tiempo</h1>
            <p class="text-sm text-blue-700 max-w-xl mx-auto">
                Todos los grandes hitos de nuestra historia, en orden cronológico. Tocá un evento
                para conocerlo en detalle.
            </p>
        </section>

        <!-- Eventos -->
        <section id="timeline-eventos" class="flex flex-col gap-4">
            <!-- Se llenan dinámicamente con JS -->
        </section>

        <section class="bg-blue-50 rounded-2xl p-5 border-2 border-blue-200 text-center">
            <p class="text-xs text-slate-600">
                Lorem ipsum: a medida que sumemos Fechas Patrias, Lugares Históricos y otras
                categorías, esta línea de tiempo se va a ir completando con más eventos.
            </p>
        </section>

    </main>

    <div id="footer-principal"></div>

    <script>
        // Eventos de la línea de tiempo general.
        // Cada evento tiene la categoría a la que pertenece y el link a la página de detalle.
        // El campo "paso" (si existe) le dice a la página de destino qué paso de su propia
        // línea de tiempo interna tiene que abrir (ver heroes/juana_azurduy.html).
        const eventosTimeline = [
            { anio: "1780", emoji: "👶", titulo: "Nacimiento de Juana Azurduy", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 1 },
            { anio: "1797", emoji: "⛪", titulo: "Juana es expulsada del convento", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 2 },
            { anio: "1805", emoji: "💍", titulo: "Juana se casa con Manuel Padilla", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 3 },
            { anio: "1809", emoji: "📢", titulo: "Comienza la Revolución de Chuquisaca", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 4 },
            { anio: "1813", emoji: "💂", titulo: "Juana se presenta ante Belgrano", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 5 },
            { anio: "1814", emoji: "🏇", titulo: "Victoria en la Batalla de Tarvita", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 6 },
            { anio: "1815", emoji: "🌊", titulo: "El escape en Pitantora", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 7 },
            { anio: "1816", emoji: "⚔️", titulo: "El triunfo en El Villar", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 8 },
            { anio: "1818", emoji: "⛰️", titulo: "Lucha guerrera en Salta", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 9 },
            { anio: "1821", emoji: "😢", titulo: "Triste retorno al norte", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 10 },
            { anio: "1825", emoji: "🌟", titulo: "Simón Bolívar visita a Juana", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 11 },
            { anio: "1862", emoji: "🕊️", titulo: "Fallece Juana Azurduy", categoria: "Héroes y Heroínas", url: "heroes/juana_azurduy.html", paso: 12 }
        ];

        function renderizarTimeline() {
            const contenedor = document.getElementById("timeline-eventos");
            contenedor.innerHTML = "";

            eventosTimeline.forEach(ev => {
                const url = ev.paso ? `${ev.url}?paso=${ev.paso}` : ev.url;

                const item = document.createElement("a");
                item.href = url;
                item.className = "bg-white rounded-2xl p-4 shadow border-2 border-sky-200 flex items-center gap-4 hover:-translate-y-0.5 hover:border-sky-400 transition transform";

                item.innerHTML = `
                    <span class="bg-sky-100 text-blue-900 font-bold text-xs px-3 py-2 rounded-xl flex-shrink-0">${ev.anio}</span>
                    <span class="text-2xl flex-shrink-0">${ev.emoji}</span>
                    <div class="flex-grow">
                        <p class="text-sm font-bold text-blue-900">${ev.titulo}</p>
                        <p class="text-[10px] text-sky-600 font-semibold">${ev.categoria}</p>
                    </div>
                    <span class="text-slate-300 flex-shrink-0">▶</span>
                `;

                contenedor.appendChild(item);
            });
        }

        renderizarTimeline();
    </script>

    <script>
      const RUTA_BASE = "";
      const PAGINA_ACTUAL = "timeline";
    </script>
    <script src="js/componentes.js"></script>
    <script>cargarMenu(RUTA_BASE, PAGINA_ACTUAL);</script>

</body>
</html>
